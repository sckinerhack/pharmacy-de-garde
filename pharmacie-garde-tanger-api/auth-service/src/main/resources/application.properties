# ── Serveur ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de donnees SQL Server ────────────────────────────────────────────────
# Local sous Windows (defaut ci-dessous) : integratedSecurity=true -> ton compte
#   Windows actuel, pas de mot de passe. Necessite la DLL mssql-jdbc_auth
#   (voir README.md de ce dossier).
# Docker (Linux, pas de compte Windows disponible) : docker-compose.yml fournit
#   un DB_URL different (utilisateur/mot de passe SQL Server) qui remplace
#   automatiquement la valeur par defaut ci-dessous.
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=pharmacie_db;integratedSecurity=true;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# update = cree/complete les tables automatiquement, ne touche pas aux donnees existantes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
# Doit etre IDENTIQUE au JWT_SECRET utilise par l'api-gateway (.env a la racine de pharmacie-garde-tanger-api)
# pour que les tokens generes par ce service soient acceptes par le reste du systeme.
jwt.secret=${JWT_SECRET:pharmacie_tanger_secret_32chars_ok}
jwt.expiration=86400000

# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=auth-service
