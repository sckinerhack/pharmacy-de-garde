<!-- BOUTON FLOTTANT -->
<div class="chat-fab" (click)="toggleChat()" [class.open]="isOpen()">
  <div class="fab-icon">
    <span *ngIf="!isOpen()">💬</span>
    <span *ngIf="isOpen()">✕</span>
  </div>
  <div class="fab-pulse" *ngIf="!isOpen()"></div>
  <div class="fab-label" *ngIf="!isOpen()">Assistant Pharmacie</div>
</div>

<!-- FENETRE CHAT -->
<div class="chat-window" [class.open]="isOpen()">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-avatar">＋</div>
      <div>
        <div class="chat-title">PharmAssist</div>
        <div class="chat-status">
          <span class="status-dot"></span>
          Assistant pharmacie IA
        </div>
      </div>
    </div>
    <button class="chat-close" (click)="toggleChat()">✕</button>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages">

    <div *ngFor="let msg of messages()"
         class="message-wrap"
         [class.user]="msg.role === 'user'"
         [class.assistant]="msg.role === 'assistant'">

      <div class="msg-avatar" *ngIf="msg.role === 'assistant'">＋</div>

      <div class="message-content">
        <div class="bubble" [innerHTML]="formatMessage(msg.content)"></div>
        <div class="msg-time">{{ msg.time }}</div>
      </div>

    </div>

    <!-- LOADING -->
    <div class="message-wrap assistant" *ngIf="isLoading()">
      <div class="msg-avatar">＋</div>
      <div class="message-content">
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div #messagesEnd></div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="chat-suggestions" *ngIf="messages().length <= 1 && !isLoading()">
    <button *ngFor="let s of suggestions"
            class="suggestion-btn"
            (click)="sendMessage(s)">
      {{ s }}
    </button>
  </div>

  <!-- INPUT -->
  <div class="chat-input-area">
    <textarea
      class="chat-input"
      placeholder="Posez votre question santé..."
      [value]="inputText()"
      (input)="inputText.set($any($event.target).value)"
      (keydown)="onKeyDown($event)"
      rows="1">
    </textarea>
    <button class="chat-send"
            (click)="sendMessage()"
            [disabled]="!inputText().trim() || isLoading()">
      <span>➤</span>
    </button>
  </div>

  <div class="chat-disclaimer">
    ⚕️ Cet assistant ne remplace pas un avis médical professionnel
  </div>

</div>
